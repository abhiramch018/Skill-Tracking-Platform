<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep navy to indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a4e;stop-opacity:1"/>
    </linearGradient>
    <!-- Shield gradient: gold to amber -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
    <!-- Cyan glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle outer glow for shield -->
    <filter id="shieldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Subtle radial glow beneath shield -->
  <ellipse cx="256" cy="265" rx="140" ry="120" fill="#06b6d4" opacity="0.12" filter="url(#glow)"/>

  <!-- Skill rays / achievement streaks -->
  <g opacity="0.35" stroke="#06b6d4" stroke-width="3" stroke-linecap="round">
    <line x1="256" y1="90"  x2="256" y2="60"/>
    <line x1="340" y1="120" x2="360" y2="100"/>
    <line x1="380" y1="200" x2="412" y2="192"/>
    <line x1="380" y1="300" x2="412" y2="312"/>
    <line x1="340" y1="380" x2="360" y2="400"/>
    <line x1="172" y1="120" x2="152" y2="100"/>
    <line x1="132" y1="200" x2="100" y2="192"/>
    <line x1="132" y1="300" x2="100" y2="312"/>
    <line x1="172" y1="380" x2="152" y2="400"/>
  </g>

  <!-- Shield body -->
  <path d="M256 108
             L362 148
             V270
             C362 330 320 378 256 404
             C192 378 150 330 150 270
             V148
             Z"
        fill="url(#shieldGrad)"
        filter="url(#shieldGlow)"/>

  <!-- Shield inner highlight (gloss) -->
  <path d="M256 124
             L348 158
             V198
             C310 192 270 185 256 180
             C242 185 202 192 164 198
             V158
             Z"
        fill="white" opacity="0.15"/>

  <!-- Certificate ribbon at bottom of shield -->
  <rect x="216" y="348" width="80" height="14" rx="7" fill="white" opacity="0.9"/>
  <rect x="232" y="366" width="48" height="10" rx="5" fill="white" opacity="0.6"/>

  <!-- Checkmark -->
  <polyline points="200,255 238,295 318,205"
            fill="none"
            stroke="white"
            stroke-width="26"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
